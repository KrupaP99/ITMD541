<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tip Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Tip Calculator</h1>

    <p class="conversion-label">Currency conversion:</p>
    <p class="conversion-rate">$1 USD = €0.95 EUR for EUROS</p>
    <p class="conversion-rate">$1 USD = ₹85 INR for Rupees</p>

    <form id="tipForm">

        <!-- Bill Total -->
        <div class="form-group">
            <label for="billTotal">Bill Total: $</label>
            <input type="text" id="billTotal" placeholder="Enter amount">
            <p id="error"></p>
        </div>

        <!-- Tax Exempt (541 requirement) -->
        <div class="form-group checkbox-group">
            <label class="checkbox-label">
                <input type="checkbox" id="taxExempt"> Tax Exempt
            </label>
        </div>

        <!-- Total with Tax -->
        <div class="form-group">
            <label for="totalWithTax">Total Bill with Tax (11%):</label>
            <input type="text" id="totalWithTax" disabled placeholder="0.00">
        </div>

        <!-- Currency -->
        <div class="form-group">
            <label for="currency">Select Currency:</label>
            <select id="currency">
                <option value="usd">US Dollars ($)</option>
                <option value="eur">Euros (€)</option>
                <option value="inr">Rupees (₹)</option>
            </select>
        </div>

        <!-- Tip Slider -->
        <div class="form-group">
            <label for="tipRange">Tip:</label>
            <div class="slider-row">
                <input type="range" id="tipRange" min="0" max="100" value="0" disabled>
                <label for="tipPercent" class="sr-only">Tip Percentage Display</label>
                <input type="text" id="tipPercent" disabled value="0%">
            </div>
        </div>

        <!-- Converted Tip Amount -->
        <div class="form-group">
            <label for="tipAmount">Converted Tip Amount:</label>
            <input type="text" id="tipAmount" disabled placeholder="0.00">
        </div>

        <!-- Final Total -->
        <div class="form-group">
            <label for="finalTotal">Converted Total Bill with Tip and Tax:</label>
            <input type="text" id="finalTotal" disabled placeholder="0.00">
        </div>

    </form>
</div>

<script src="script.js"></script>
</body>
</html>
